<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Area fill under chart -->
  <path d="M 68,370 L 165,295 L 248,318 L 332,228 L 418,148 L 444,122 L 444,430 L 68,430 Z"
        fill="url(#fill)"/>

  <!-- Chart line -->
  <polyline
    points="68,370 165,295 248,318 332,228 418,148 444,122"
    fill="none"
    stroke="#10B981"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Glowing dot at peak -->
  <circle cx="444" cy="122" r="26" fill="#10B981" fill-opacity="0.3" filter="url(#glow)"/>
  <circle cx="444" cy="122" r="16" fill="#10B981"/>
  <circle cx="444" cy="122" r="7" fill="white"/>
</svg>
